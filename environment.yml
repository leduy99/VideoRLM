name: videorlm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip>=24
  - ffmpeg
  - pip:
      - -e .
      - accelerate>=1.12.0
      - datasets>=4.8.4
      - huggingface-hub>=0.36.2
      - pillow>=12.1.1
      - pytest-asyncio>=1.3.0
      - pytest-cov>=7.1.0
      - qwen-asr>=0.0.6
      - ruff>=0.15.9
      - safetensors>=0.7.0
      - transformers>=4.57.6
      - yt-dlp>=2026.3.17
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.11.0+cu128
      - torchvision==0.26.0+cu128
      - torchaudio==2.11.0+cu128
